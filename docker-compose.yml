services:
  alexis-web:
    build: .
    container_name: alexis-web
    restart: unless-stopped
    networks:
      - alex2-net
    volumes:
      - ./backend:/var/www/html
    env_file:
      - .env.docker
    environment:
      DB_HOST: php-prod-db
      DB_PORT: 3306
      DB_DATABASE: alexis_dev_web
      DB_USERNAME: alexis_web
      DB_PASSWORD: ${DB_PASSWORD}

  calcom-db:
    image: postgres:16-alpine
    container_name: calcom-db
    restart: unless-stopped
    networks:
      - alex2-net
    environment:
      POSTGRES_DB: calcom
      POSTGRES_USER: calcom_user
      POSTGRES_PASSWORD: ${CALCOM_DB_PASSWORD}
    volumes:
      - calcom-db-data:/var/lib/postgresql/data

  calcom:
    build:
      context: .
      dockerfile: Dockerfile.calcom
    image: calcom-patched:latest
    container_name: calcom
    restart: unless-stopped
    networks:
      - alex2-net
    depends_on:
      - calcom-db
    env_file:
      - .env.docker
    environment:
      NEXTAUTH_URL: https://rdv.alexis-rodrigues.fr
      NEXT_PUBLIC_WEBAPP_URL: https://rdv.alexis-rodrigues.fr
      BUILT_NEXT_PUBLIC_WEBAPP_URL: https://rdv.alexis-rodrigues.fr
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      DATABASE_URL: postgresql://calcom_user:${CALCOM_DB_PASSWORD}@calcom-db:5432/calcom
      DATABASE_DIRECT_URL: postgresql://calcom_user:${CALCOM_DB_PASSWORD}@calcom-db:5432/calcom
      CALENDSO_ENCRYPTION_KEY: ${CALENDSO_ENCRYPTION_KEY}
      EMAIL_FROM: alexis dev web <contact@alex2.dev>
      EMAIL_SERVER_HOST: ssl0.ovh.net
      EMAIL_SERVER_PORT: 465
      EMAIL_SERVER_USER: contact@alex2.dev
      EMAIL_SERVER_PASSWORD: ${EMAIL_SERVER_PASSWORD}

networks:
  alex2-net:
    external: true

volumes:
  calcom-db-data:
